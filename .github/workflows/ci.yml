jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Step 1: Restore dependencies inside the CareerHub folder
      - name: Restore dependencies
        working-directory: ./CareerHub
        run: dotnet restore

      # Step 2: Build the project inside the CareerHub folder
      - name: Build
        working-directory: ./CareerHub
        run: dotnet build --configuration Release

      # Step 3: Run tests in the API.Tests folder
      - name: Test
        working-directory: ./API.Tests
        run: dotnet test